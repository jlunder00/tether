[supervisord]
nodaemon=true
logfile=/dev/null

[program:redis]
command=redis-server --save "" --loglevel warning
user=tether
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
autorestart=true
priority=5

[program:agent-pool-manager]
command=python -m agent_pool_manager --port 5002
user=tether
environment=HOME="/home/tether",USER="tether",LOGNAME="tether"
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
autorestart=true
priority=10

[program:api]
command=uvicorn api.main:app --host 0.0.0.0 --port 8000
user=tether
environment=HOME="/home/tether",USER="tether",LOGNAME="tether",REDIS_URL="redis://localhost:6379"
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
autorestart=true

[program:mcp]
command=python -m tether_mcp.server --sse
user=tether
environment=HOME="/home/tether",USER="tether",LOGNAME="tether"
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
autorestart=true

[program:bot]
command=bash -c "if [ -z \"$TELEGRAM_WEBHOOK_URL\" ]; then until curl -sf http://localhost:8000/api/health > /dev/null; do sleep 2; done && exec python -m bot.message_handler; else echo '[bot] Webhook mode active — polling process not needed' && exec sleep infinity; fi"
user=tether
environment=HOME="/home/tether",USER="tether",LOGNAME="tether"
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
autorestart=true
startsecs=10

[program:interactive-agent-layer]
command=python -m interactive_agent_layer --port 5003
user=tether
environment=HOME="/home/tether",USER="tether",LOGNAME="tether",REDIS_URL="redis://localhost:6379"
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
autorestart=true
priority=20
