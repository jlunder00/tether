name: "Deploy to Fly.io"

# Deploys to Fly.io on pushes to main (prod) or dev (dev).
# Fly handles the remote image build -- no self-hosted runner needed.
#
# Versioning:
#   TETHER_VERSION is read from pyproject.toml at deploy time.
#   Release version bumps are done via scripts/release.sh (which tags + pushes),
#   not by this workflow. This workflow just bakes whatever version is in
#   pyproject.toml into the Docker image as an env var.
#
#   Prod deploys: TETHER_VERSION = pyproject version (e.g. 0.1.0)
#   Dev deploys:  TETHER_VERSION = pyproject version + -dev.{sha7} (e.g. 0.1.0-dev.abc1234)
#
# Required secrets:
#   FLY_API_TOKEN        -- Fly.io personal access token
#   TETHER_PREMIUM_TOKEN -- GitHub PAT for installing tether-premium from tether-pypi

on:
  push:
    branches: [main, dev]
    paths:
      - 'api/**'
      - 'bot/**'
      - 'tether_mcp/**'
      - 'db/**'
      - 'shared/**'
      - 'prompts/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'supervisord.conf'
      - 'fly.toml'
      - 'fly.dev.toml'
      - 'docker-entrypoint.sh'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - dev
          - both

permissions:
  contents: read

jobs:
  deploy-prod:
    name: Deploy prod (tether-prod)
    if: |
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && (inputs.environment == 'prod' || inputs.environment == 'both'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Read version from pyproject.toml
        id: version
        run: |
          VERSION=$(python3 -c "
import re, sys
with open('pyproject.toml') as f:
    for line in f:
        m = re.match(r'^version\s*=\s*\"(.+)\"', line)
        if m:
            print(m.group(1)); sys.exit(0)
sys.exit(1)
")
          echo "value=${VERSION}" >> $GITHUB_OUTPUT

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to tether-prod
        # --ha=false: single machine (no auto-HA pair). Bot long-polls, not stateless.
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          PREMIUM_GIT_TOKEN: ${{ secrets.TETHER_PREMIUM_TOKEN }}
          TETHER_VERSION: ${{ steps.version.outputs.value }}
        run: |
          flyctl deploy --config fly.toml --remote-only --ha=false \
            --build-arg PREMIUM_GIT_TOKEN="$PREMIUM_GIT_TOKEN" \
            --build-arg TETHER_VERSION="$TETHER_VERSION"

  deploy-dev:
    name: Deploy dev (tether-dev)
    if: |
      github.ref == 'refs/heads/dev' ||
      (github.event_name == 'workflow_dispatch' && (inputs.environment == 'dev' || inputs.environment == 'both'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Read version from pyproject.toml
        id: version
        run: |
          BASE=$(python3 -c "
import re, sys
with open('pyproject.toml') as f:
    for line in f:
        m = re.match(r'^version\s*=\s*\"(.+)\"', line)
        if m:
            print(m.group(1)); sys.exit(0)
sys.exit(1)
")
          SHA7=$(echo "$GITHUB_SHA" | cut -c1-7)
          echo "value=${BASE}-dev.${SHA7}" >> $GITHUB_OUTPUT

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to tether-dev
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          PREMIUM_GIT_TOKEN: ${{ secrets.TETHER_PREMIUM_TOKEN }}
          TETHER_VERSION: ${{ steps.version.outputs.value }}
        run: |
          flyctl deploy --config fly.dev.toml --remote-only --ha=false \
            --build-arg PREMIUM_GIT_TOKEN="$PREMIUM_GIT_TOKEN" \
            --build-arg TETHER_VERSION="$TETHER_VERSION"
