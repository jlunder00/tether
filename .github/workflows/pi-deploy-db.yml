name: "[Pi] Deploy DB (migrations)"

on:
  push:
    branches: [main]
    paths:
      - 'db/**'
      - 'alembic.ini'
  workflow_dispatch:
    inputs:
      no_cache:
        description: "Force --no-cache build"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read

concurrency:
  group: pi-deploy
  cancel-in-progress: false

jobs:
  deploy-db:
    name: Run DB migrations
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /home/toast/tether
          git pull origin main

      - name: Write DB config
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          TETHER_APP_PASSWORD: ${{ secrets.TETHER_APP_PASSWORD }}
        run: |
          cd /home/toast/tether
          make configure-db \
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD} \
            TETHER_APP_PASSWORD=${TETHER_APP_PASSWORD}

      - name: Run Alembic migrations
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          cd /home/toast/tether
          source .venv/bin/activate
          DATABASE_URL=postgresql://tether:${POSTGRES_PASSWORD}@localhost:5432/tether \
            alembic upgrade head

