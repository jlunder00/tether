name: Publish community edition

# Triggered only on version tags — publishes the open-source image to ghcr.io.
# Pi deploys are handled by per-service deploy-*.yml workflows.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write   # needed to push to ghcr.io

jobs:
  publish-community:
    name: Publish community edition to ghcr.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for branch-reachability check

      - name: Assert tag is on the correct branch
        env:
          GH_REF: ${{ github.ref }}
        run: |
          TAG="${GH_REF#refs/tags/}"
          # Alpha tags (vX.Y.ZaN) must be reachable from dev; stable (vX.Y.Z) from main.
          if echo "${TAG}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+a[0-9]+$'; then
            REQUIRED_BRANCH="dev"
          elif echo "${TAG}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            REQUIRED_BRANCH="main"
          else
            echo "ERROR: Unrecognised tag format '${TAG}'. Expected vX.Y.Z or vX.Y.ZaN." >&2
            exit 1
          fi
          git fetch origin "${REQUIRED_BRANCH}" --depth=100 2>/dev/null || git fetch origin "${REQUIRED_BRANCH}"
          if ! git merge-base --is-ancestor "refs/tags/${TAG}" "origin/${REQUIRED_BRANCH}" 2>/dev/null; then
            echo "ERROR: Tag '${TAG}' must be reachable from branch '${REQUIRED_BRANCH}' but is not." >&2
            echo "Stable tags (vX.Y.Z) must be tagged on main; alpha tags (vX.Y.ZaN) must be tagged on dev." >&2
            exit 1
          fi
          echo "Branch guard passed: tag '${TAG}' is reachable from '${REQUIRED_BRANCH}'."

      - name: Resolve version tag
        id: version
        run: |
          SHA_TAG="sha-$(echo ${GITHUB_SHA} | cut -c1-7)"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            SEMVER="${GITHUB_REF#refs/tags/}"
            echo "tag=${SEMVER}" >> $GITHUB_OUTPUT
            echo "extra_tag=${SEMVER}" >> $GITHUB_OUTPUT
          else
            echo "tag=${SHA_TAG}" >> $GITHUB_OUTPUT
            echo "extra_tag=" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${ACTOR}" --password-stdin

      - name: Build and push community image
        env:
          TAG: ${{ steps.version.outputs.tag }}
          EXTRA_TAG: ${{ steps.version.outputs.extra_tag }}
        run: |
          make build-community TAG=${TAG}
          IMAGE=ghcr.io/jlunder00/tether
          docker push ${IMAGE}:${TAG}
          docker tag ${IMAGE}:${TAG} ${IMAGE}:latest
          docker push ${IMAGE}:latest
          if [ -n "${EXTRA_TAG}" ]; then
            docker tag ${IMAGE}:${TAG} ${IMAGE}:${EXTRA_TAG}
            docker push ${IMAGE}:${EXTRA_TAG}
          fi
