name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          pip install -q -e ".[dev]"

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest -v
