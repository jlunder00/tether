# ~/.tether-config/config.yaml
# Copy this file to ~/.tether-config/config.yaml and fill in your values.

telegram:
  bot_token: "YOUR_BOT_TOKEN_HERE"   # From BotFather
  chat_id: "YOUR_CHAT_ID_HERE"       # Your Telegram user/chat ID

schedule:
  wake_time: "07:00"
  sleep_target: "22:30"

planning_block:
  time: "21:00"
  locked: true
  reschedule_if_missed: true
  reschedule_interval_minutes: 30

follow_up:
  enabled: true
  interval_minutes: 15
  max_attempts: 4

# Bot-to-API authentication (required for agent coordination features)
api:
  base_url: "http://localhost:8000"
  bot_token: ""  # JWT or shared secret — set this to enable meeting coordination

# LLM model assignments per pipeline role.
# Values are passed directly to the --model flag of `claude -p`.
# Remove any key to fall back to the built-in default for that role.
models:
  orchestrator:              claude-sonnet-4-6
  meta_eval:                 claude-haiku-4-5-20251001
  meta_eval_repair:          claude-haiku-4-5-20251001
  meta_eval_repair_escalate: claude-sonnet-4-6
  execution_subagent:        claude-haiku-4-5-20251001
  satisfaction_eval:         claude-haiku-4-5-20251001
  response_builder:          claude-sonnet-4-6
