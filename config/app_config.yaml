# Application behavior — safe to commit, no secrets.
# Self-hosters: place overrides at TETHER_CONFIG_DIR/app_config.yaml

models:
  orchestrator: claude-sonnet-4-5
  meta_eval: claude-haiku-4-5
  quick_classifier: claude-haiku-4-5
  response_builder: claude-sonnet-4-5
  satisfaction_eval: claude-haiku-4-5

pipeline:
  history_exchanges: 5
  max_planning_rounds: 4
  max_repair_attempts: 3
  max_satisfaction_retries: 2

server:
  api_port: 8000
  mcp_port: 5001

telegram:
  # Resolved from env vars — allows cloud deployments (Fly.io) without a
  # local config override dir. Pi deployments override via TETHER_CONFIG_DIR.
  bot_token: "${TELEGRAM_BOT_TOKEN:-}"
  chat_id: "${TELEGRAM_CHAT_ID:-}"
